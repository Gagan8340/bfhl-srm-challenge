<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL · Node Hierarchy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  /* ─── Reset & Tokens ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7fffb0;
    --accent2: #ff6b6b;
    --accent3: #6bb5ff;
    --text: #e8e8f0;
    --muted: #6060780;
    --muted: #606078;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Background grid ────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Layout ─────────────────────────────────────── */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  /* ─── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 56px;
    animation: slideDown .6s cubic-bezier(.16,1,.3,1) both;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px #7fffb030;
  }

  .logo-mark svg { width: 28px; height: 28px; }

  .header-text h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .header-text h1 span { color: var(--accent); }

  .header-text p {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ─── Card ───────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    animation: fadeUp .6s cubic-bezier(.16,1,.3,1) both;
  }

  .card + .card { margin-top: 20px; }

  .card-label {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--accent);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── Input area ─────────────────────────────────── */
  .input-wrapper { position: relative; }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    line-height: 1.7;
    padding: 16px 20px;
    resize: vertical;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #7fffb018;
  }

  textarea::placeholder { color: var(--muted); }

  .hint {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.6;
  }

  .hint code {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--accent3);
  }

  /* ─── API URL input ──────────────────────────────── */
  .url-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .url-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .8rem;
    padding: 10px 16px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .url-row input:focus {
    border-color: var(--accent3);
    box-shadow: 0 0 0 3px #6bb5ff18;
  }

  /* ─── Button ─────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #000;
    font-family: var(--sans);
    font-weight: 700;
    font-size: .9rem;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, opacity .15s;
    white-space: nowrap;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #7fffb040; }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn.loading { pointer-events: none; }

  .btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid #00000040;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { display: none; }

  /* ─── Submit row ─────────────────────────────────── */
  .submit-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* ─── Error ──────────────────────────────────────── */
  .error-box {
    display: none;
    background: #ff6b6b12;
    border: 1px solid #ff6b6b40;
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: .8rem;
    color: var(--accent2);
    margin-top: 16px;
    line-height: 1.6;
  }

  .error-box.show { display: block; animation: fadeUp .3s ease both; }

  /* ─── Results section ────────────────────────────── */
  #results { display: none; }
  #results.show { display: block; }

  /* ─── Summary pills ──────────────────────────────── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 4px;
  }

  .summary-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .summary-pill .val {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    display: block;
  }

  .summary-pill .lbl {
    font-family: var(--mono);
    font-size: .62rem;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 6px;
    display: block;
  }

  /* ─── Hierarchy cards ────────────────────────────── */
  .hierarchies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .h-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }

  .h-card:hover { border-color: var(--accent); }

  .h-card.cycle-card { border-color: #ff6b6b30; }
  .h-card.cycle-card:hover { border-color: var(--accent2); }

  .h-card .root-badge {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .h-card .root-name {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .h-card.cycle-card .root-name { color: var(--accent2); }

  .h-card .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .badge {
    font-family: var(--mono);
    font-size: .65rem;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: .06em;
  }

  .badge-depth { background: #7fffb018; color: var(--accent); border: 1px solid #7fffb030; }
  .badge-cycle { background: #ff6b6b18; color: var(--accent2); border: 1px solid #ff6b6b30; }

  /* ─── Tree visualiser ────────────────────────────── */
  .tree-view {
    font-family: var(--mono);
    font-size: .75rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    white-space: pre;
  }

  .tree-node { color: var(--accent3); }
  .tree-branch { color: #3a3a5a; }

  /* ─── Lists ──────────────────────────────────────── */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .tag {
    font-family: var(--mono);
    font-size: .72rem;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .tag.invalid { border-color: #ff6b6b40; color: var(--accent2); background: #ff6b6b08; }
  .tag.duplicate { border-color: #ffd06b40; color: #ffd06b; background: #ffd06b08; }

  .empty-label {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
  }

  /* ─── Raw JSON toggle ────────────────────────────── */
  .raw-toggle {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    transition: color .2s;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .raw-toggle:hover { color: var(--text); }

  .raw-json {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: var(--mono);
    font-size: .73rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
    margin-top: 12px;
  }

  .raw-json.show { display: block; animation: fadeUp .3s ease both; }

  /* ─── Animations ─────────────────────────────────── */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Stagger animations ─────────────────────────── */
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .10s; }
  .card:nth-child(3) { animation-delay: .15s; }
  .card:nth-child(4) { animation-delay: .20s; }
  .card:nth-child(5) { animation-delay: .25s; }

  .h-card { animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both; }

  /* ─── Responsive ─────────────────────────────────── */
  @media (max-width: 480px) {
    .url-row { flex-direction: column; }
    .submit-row { justify-content: stretch; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="6" r="3" fill="#7fffb0"/>
        <circle cx="6"  cy="22" r="3" fill="#7fffb0"/>
        <circle cx="22" cy="22" r="3" fill="#7fffb0"/>
        <line x1="14" y1="9"  x2="6"  y2="19" stroke="#7fffb0" stroke-width="1.5"/>
        <line x1="14" y1="9"  x2="22" y2="19" stroke="#7fffb0" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>BFHL <span>Explorer</span></h1>
      <p>Node Hierarchy Processor · SRM Challenge</p>
    </div>
  </header>

  <!-- Input Card -->
  <div class="card" style="animation-delay:.05s">
    <div class="card-label">Input</div>

    <div class="url-row" style="margin-top:0; margin-bottom:16px;">
      <input id="apiUrl" type="text" value="" placeholder="API Base URL (defaults to current origin)" spellcheck="false" />
    </div>

    <textarea id="nodeInput" placeholder="Paste edges one per line or comma-separated&#10;&#10;A->B&#10;A->C&#10;B->D, C->E, E->F&#10;X->Y, Y->Z, Z->X&#10;hello, 1->2, A->"></textarea>

    <p class="hint">
      Format: <code>X->Y</code> where X and Y are single uppercase letters A–Z.<br>
      Separate edges with commas or newlines. Whitespace is trimmed automatically.
    </p>

    <div id="errorBox" class="error-box"></div>

    <div class="submit-row">
      <button class="btn" id="submitBtn" onclick="submitData()">
        <span class="btn-text">▶ Process Nodes</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="results">

    <!-- Summary -->
    <div class="card" id="summaryCard">
      <div class="card-label">Summary</div>
      <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <!-- Hierarchies -->
    <div class="card" id="hierarchiesCard">
      <div class="card-label">Hierarchies</div>
      <div class="hierarchies-grid" id="hierarchiesGrid"></div>
    </div>

    <!-- Invalid & Duplicates -->
    <div class="card" id="flagsCard">
      <div class="card-label">Flags</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:4px;">
        <div>
          <div class="card-label" style="margin-bottom:8px;">Invalid Entries</div>
          <div id="invalidList" class="tag-list"></div>
        </div>
        <div>
          <div class="card-label" style="margin-bottom:8px;">Duplicate Edges</div>
          <div id="duplicateList" class="tag-list"></div>
        </div>
      </div>
    </div>

    <!-- Identity -->
    <div class="card" id="identityCard">
      <div class="card-label">Identity</div>
      <div style="font-family:var(--mono); font-size:.78rem; line-height:2; margin-top:4px;">
        <div id="identityFields"></div>
      </div>
    </div>

    <!-- Raw JSON -->
    <div class="card" style="margin-top:20px;">
      <div class="card-label">Raw Response</div>
      <button class="raw-toggle" onclick="toggleRaw()">Show / hide JSON</button>
      <pre id="rawJson" class="raw-json"></pre>
    </div>

  </div>
</div>

<script>
// ── Tree renderer ─────────────────────────────────────────────────────────────
function renderTree(obj, prefix = '', isLast = true) {
  if (!obj || typeof obj !== 'object') return '';
  const keys = Object.keys(obj);
  if (keys.length === 0) return '';
  let out = '';
  keys.forEach((key, i) => {
    const last = i === keys.length - 1;
    const connector = last ? '└── ' : '├── ';
    const childPrefix = prefix + (last ? '    ' : '│   ');
    out += `${prefix}<span class="tree-branch">${connector}</span><span class="tree-node">${key}</span>\n`;
    out += renderTree(obj[key], childPrefix, last);
  });
  return out;
}

function buildTreeHtml(tree) {
  const roots = Object.keys(tree);
  if (roots.length === 0) return '';
  const root = roots[0];
  let html = `<span class="tree-node">${root}</span>\n`;
  html += renderTree(tree[root]);
  return html;
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitData() {
  const rawInput = document.getElementById('nodeInput').value.trim();
  const apiBaseInput = document.getElementById('apiUrl').value.trim();
  const apiBase  = (apiBaseInput || window.location.origin).replace(/\/+$/, '');
  const btn      = document.getElementById('submitBtn');
  const errBox   = document.getElementById('errorBox');
  const results  = document.getElementById('results');

  if (!rawInput) { showError('Please enter at least one edge.'); return; }
  if (!apiBase)  { showError('Please enter the API base URL.'); return; }

  // Parse: split by comma or newline, trim each
  const data = rawInput
    .split(/[\n,]+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);

  // UI loading state
  btn.classList.add('loading');
  btn.disabled = true;
  errBox.classList.remove('show');
  results.classList.remove('show');

  try {
    const resp = await fetch(`${apiBase}/bfhl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);

    const json = await resp.json();
    renderResults(json);
  } catch (err) {
    showError(`API call failed: ${err.message}\n\nMake sure CORS is enabled and the URL is correct.`);
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderResults(json) {
  // Summary
  const { total_trees, total_cycles, largest_tree_root } = json.summary || {};
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-pill">
      <span class="val">${total_trees ?? '-'}</span>
      <span class="lbl">Valid Trees</span>
    </div>
    <div class="summary-pill">
      <span class="val">${total_cycles ?? '-'}</span>
      <span class="lbl">Cycles Detected</span>
    </div>
    <div class="summary-pill">
      <span class="val" style="font-size:1.4rem">${largest_tree_root || '—'}</span>
      <span class="lbl">Largest Tree Root</span>
    </div>
  `;

  // Hierarchies
  const hGrid = document.getElementById('hierarchiesGrid');
  hGrid.innerHTML = '';
  (json.hierarchies || []).forEach((h, idx) => {
    const isCycle = h.has_cycle === true;
    const card = document.createElement('div');
    card.className = `h-card ${isCycle ? 'cycle-card' : ''}`;
    card.style.animationDelay = `${idx * 0.06}s`;

    const depthBadge = !isCycle
      ? `<span class="badge badge-depth">depth ${h.depth}</span>`
      : '';
    const cycleBadge = isCycle
      ? `<span class="badge badge-cycle">⟳ cycle</span>`
      : '';

    const treeHtml = isCycle
      ? `<div class="tree-view" style="color:var(--muted); font-style:italic">No tree — cycle detected</div>`
      : `<div class="tree-view">${buildTreeHtml(h.tree)}</div>`;

    card.innerHTML = `
      <div class="root-badge">Root Node</div>
      <div class="root-name">${h.root}</div>
      <div class="meta-row">${depthBadge}${cycleBadge}</div>
      ${treeHtml}
    `;
    hGrid.appendChild(card);
  });

  // Invalid entries
  const invList = document.getElementById('invalidList');
  const inv = json.invalid_entries || [];
  invList.innerHTML = inv.length
    ? inv.map(e => `<span class="tag invalid">${escHtml(e) || '(empty)'}</span>`).join('')
    : '<span class="empty-label">None</span>';

  // Duplicates
  const dupList = document.getElementById('duplicateList');
  const dup = json.duplicate_edges || [];
  dupList.innerHTML = dup.length
    ? dup.map(e => `<span class="tag duplicate">${escHtml(e)}</span>`).join('')
    : '<span class="empty-label">None</span>';

  // Identity
  document.getElementById('identityFields').innerHTML = `
    <div><span style="color:var(--muted)">user_id &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${escHtml(json.user_id)}</div>
    <div><span style="color:var(--muted)">email_id &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${escHtml(json.email_id)}</div>
    <div><span style="color:var(--muted)">college_roll_number </span>${escHtml(json.college_roll_number)}</div>
  `;

  // Raw JSON
  document.getElementById('rawJson').innerHTML = escHtml(JSON.stringify(json, null, 2));

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleRaw() {
  document.getElementById('rawJson').classList.toggle('show');
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Allow Ctrl+Enter to submit
document.getElementById('nodeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitData();
});
</script>
</body>
</html>
